services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=${OPENSEARCH_JAVA_OPTS}
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - osdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - GOOSE_DRIVER=postgres
      - GOOSE_DBSTRING=postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
    volumes:
      - ./migrations:/migrations
    command: ["-dir", "/migrations", "up"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_INDEX=perfumes
      - SERVER_PORT=8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    command: ["/app/api"]

  ingest:
    build:
      context: .
      dockerfile: Dockerfile.ingest
    depends_on:
      api:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - CSV_PATH=/app/data/processed/dataset_final.csv
    command: ["python", "scripts/03_ingest_normalized.py", "--csv", "/app/data/processed/dataset_final.csv"]

  ingest-embeddings:
    build:
      context: .
      dockerfile: Dockerfile.ingest
    depends_on:
      ingest:
        condition: service_completed_successfully
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - PARQUET_PATH=/app/data/processed/perfumes_with_embeddings.parquet
    command: ["python", "scripts/04_ingest_embeddings.py", "--truncate"]

  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      ingest-embeddings:
        condition: service_completed_successfully
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_INDEX=perfumes
    command: ["/app/indexer", "-recreate"]

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    depends_on:
      indexer:
        condition: service_completed_successfully
    environment:
      - BOT_API_KEY=${BOT_API_KEY}
      - API_BASE_URL=http://api:8080
      - ENABLE_VECTOR_SEARCH=true
    restart: unless-stopped

volumes:
  pgdata:
  osdata:
