[tool.pytest.ini_options]
testpaths = ["bot/tests", "scraper/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = ["data", "notebooks"]

[tool.ruff.lint]
select = ["B", "C4", "E", "F", "I", "PIE", "RUF", "SIM", "UP"]
ignore = ["E501", "RUF001"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
